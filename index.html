<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0e1116">
<title>F2L Trainer · Speedcubing</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
  <h1>F2L Trainer</h1>
  <span class="sub">front-right slot · white cross</span>
  <button id="settingsBtn" title="Settings">⚙</button>
  <button id="casesBtn">☰  Cases</button>
</header>

<!-- Settings popover -->
<div id="settings" class="popover">
  <label class="setlabel">Animation speed</label>
  <div class="speed">Slow <input type="range" id="speed" min="180" max="1300" value="620" step="20"> Fast</div>
  <div class="sethint">Drag the cube to rotate · ← / → step · Space play/pause</div>
</div>

<!-- Collapsible case selector -->
<div id="backdrop"></div>
<div id="drawer">
  <div class="drawerhead">
    <strong>Choose a case</strong>
    <span class="spacer"></span>
    <button id="drawerClose">Close ✕</button>
  </div>
  <div class="search"><input id="search" placeholder="Filter (alg or description)…" autocomplete="off"></div>
  <div class="caselist" id="caselist"></div>
</div>

<main>
  <div class="scene" id="scene"><div class="cube" id="cube"></div></div>

  <div class="viewbtns">
    <button data-view="topfront">Top / F-R</button>
    <button data-view="cross">Cross (bottom)</button>
    <button data-view="recenter">Re-center</button>
  </div>

  <div class="infobar">
    <div class="title" id="caseTitle">—</div>
    <div class="desc" id="caseDesc"></div>
    <div class="algline" id="algline"></div>
  </div>

  <div class="controls">
    <button class="ctrl" id="reset" title="Back to start">⟲</button>
    <button class="ctrl" id="back" title="Step back">◀</button>
    <button class="ctrl primary" id="play" title="Play / pause">▶</button>
    <button class="ctrl" id="fwd" title="Step forward">▶▶</button>
    <span class="progress" id="progress">0 / 0</span>
  </div>
</main>

<script src="engine.js"></script>
<script src="app.js"></script>
</body>
</html>
